version: 3
dotenv: ['.env']

vars:
  BINARY_NAME: esxi-lab-scheduler
  REMOTE_PATH: /opt/esxi-lab
  SERVICE_NAME: esxi-lab-scheduler
  USER: '{{.DEPLOY_USER | default "zhukov"}}'
  HOST: '{{.DEPLOY_HOST | default "172.17.17.8"}}'
  PORT: '{{.DEPLOY_PORT | default "22"}}'
  SSH_KEY: '{{.HOME}}/.ssh/id_rsa_esxi_lab'
  TIMER_INTERVAL_HOURS: '{{.TIMER_INTERVAL_HOURS | default "3"}}'
  SSH: ssh -i {{.SSH_KEY}} -o StrictHostKeyChecking=no -p {{.PORT}} {{.USER}}@{{.HOST}}
  SCP: scp -i {{.SSH_KEY}} -o StrictHostKeyChecking=no -P {{.PORT}}

tasks:
  build:
    desc: Build the scheduler binary from source
    dir: api
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../{{.BINARY_NAME}} ./cmd/server/main.go
    sources:
      - api/**/*.go
    generates:
      - "{{.BINARY_NAME}}"

  download:
    desc: Download latest release binary from GitHub
    cmds:
      - echo "Downloading latest {{.BINARY_NAME}}..."
      - curl -fsSL -o {{.BINARY_NAME}} https://github.com/EpicMandM/esxi-lab-provider/releases/latest/download/{{.BINARY_NAME}}
      - chmod +x {{.BINARY_NAME}}

  ssh-keygen:
    desc: Generate SSH key and upload to remote server for passwordless access
    cmds:
      - |
        if [ ! -f {{.SSH_KEY}} ]; then
          echo "Generating new SSH key..."
          ssh-keygen -t rsa -b 4096 -f {{.SSH_KEY}} -N "" -C "esxi-lab-deployment"
        else
          echo "SSH key already exists at {{.SSH_KEY}}"
        fi
      - ssh-copy-id -i {{.SSH_KEY}}.pub -p {{.PORT}} {{.USER}}@{{.HOST}}

  setup-sudo:
    desc: Configure passwordless sudo for deployment user
    cmds:
      - |
        {{.SSH}} -t "echo '{{.USER}} ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/{{.USER}} > /dev/null && sudo chmod 0440 /etc/sudoers.d/{{.USER}}"

  setup-logging:
    desc: Configure journald to retain logs for 7 days
    cmds:
      - |
        {{.SSH}} "sudo mkdir -p /etc/systemd/journald.conf.d && sudo tee /etc/systemd/journald.conf.d/retention.conf > /dev/null <<EOF
        [Journal]
        Storage=persistent
        MaxRetentionSec=7d
        SystemMaxUse=500M
        EOF"
      - '{{.SSH}} "sudo systemctl restart systemd-journald"'

  deploy:
    desc: "Download latest release and deploy to remote server (override release with VERSION=vX.Y.Z)"
    deps: [download]
    cmds:
      - task: _deploy

  deploy:local:
    desc: Build from source and deploy to remote server
    deps: [build]
    cmds:
      - task: _deploy

  _deploy:
    internal: true
    desc: Copy binary and config files to remote server and install systemd units
    cmds:
      - echo "Deploying to {{.USER}}@{{.HOST}}:{{.PORT}}"
      - '{{.SSH}} "sudo mkdir -p {{.REMOTE_PATH}} && sudo chown {{.USER}}:{{.USER}} {{.REMOTE_PATH}}"'
      - '{{.SCP}} {{.BINARY_NAME}} {{.USER}}@{{.HOST}}:{{.REMOTE_PATH}}/{{.BINARY_NAME}}'
      - '{{.SCP}} .env {{.USER}}@{{.HOST}}:{{.REMOTE_PATH}}/.env'
      - '{{.SCP}} api/data/user_config.toml {{.USER}}@{{.HOST}}:{{.REMOTE_PATH}}/user_config.toml'
      - '{{.SCP}} infra/terraform/service-account.json {{.USER}}@{{.HOST}}:{{.REMOTE_PATH}}/service-account.json'
      - |
        {{.SSH}} "sudo tee /etc/systemd/system/{{.SERVICE_NAME}}.service > /dev/null <<EOF
        [Unit]
        Description=ESXi Lab Scheduler
        After=network.target

        [Service]
        Type=oneshot
        User={{.USER}}
        WorkingDirectory={{.REMOTE_PATH}}
        Environment=CONFIG_PATH={{.REMOTE_PATH}}/user_config.toml
        Environment=SERVICE_ACCOUNT_PATH={{.REMOTE_PATH}}/service-account.json
        EnvironmentFile={{.REMOTE_PATH}}/.env
        ExecStart={{.REMOTE_PATH}}/{{.BINARY_NAME}}
        StandardOutput=journal
        StandardError=journal
        SyslogIdentifier={{.SERVICE_NAME}}

        [Install]
        WantedBy=multi-user.target
        EOF"
      - |
        {{.SSH}} "sudo tee /etc/systemd/system/{{.SERVICE_NAME}}.timer > /dev/null <<EOF
        [Unit]
        Description=ESXi Lab Scheduler Timer (runs every {{.TIMER_INTERVAL_HOURS}}h from midnight)

        [Timer]
        OnCalendar=*-*-* 0/{{.TIMER_INTERVAL_HOURS}}:00:00
        AccuracySec=1s
        Persistent=false

        [Install]
        WantedBy=timers.target
        EOF"
      - '{{.SSH}} "sudo chmod +x {{.REMOTE_PATH}}/{{.BINARY_NAME}}"'
      - '{{.SSH}} "sudo systemctl daemon-reload"'
      - '{{.SSH}} "sudo systemctl enable {{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo systemctl restart {{.SERVICE_NAME}}.timer"'

  status:
    desc: Check scheduler status on remote server
    cmds:
      - '{{.SSH}} "sudo systemctl status {{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo systemctl list-timers {{.SERVICE_NAME}}.timer"'

  logs:
    desc: View scheduler logs on remote server
    vars:
      LINES: '{{.LINES | default "100"}}'
    cmds:
      - '{{.SSH}} "sudo journalctl -u {{.SERVICE_NAME}}.service -n {{.LINES}} --no-pager"'

  stop:
    desc: Stop and disable scheduler on remote server
    cmds:
      - '{{.SSH}} "sudo systemctl stop {{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo systemctl disable {{.SERVICE_NAME}}.timer"'

  clean:
    desc: Remove deployment files from remote server
    cmds:
      - '{{.SSH}} "sudo systemctl stop {{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo systemctl disable {{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo rm -f /etc/systemd/system/{{.SERVICE_NAME}}.service"'
      - '{{.SSH}} "sudo rm -f /etc/systemd/system/{{.SERVICE_NAME}}.timer"'
      - '{{.SSH}} "sudo rm -rf {{.REMOTE_PATH}}"'
      - '{{.SSH}} "sudo systemctl daemon-reload"'

  test-run:
    desc: Trigger a single scheduler run on remote server
    cmds:
      - '{{.SSH}} "sudo systemctl start {{.SERVICE_NAME}}.service"'
      - '{{.SSH}} "sudo journalctl -u {{.SERVICE_NAME}}.service -n 100"'

  tunnel:
    desc: "TCP tunnel localhost:10443 -> ESXi via WireGuard (run inside devcontainer or auto-detect)"
    vars:
      REMOTE_HOST: '{{.REMOTE_HOST | default "172.17.17.29"}}'
      REMOTE_PORT: '{{.REMOTE_PORT | default "443"}}'
      LOCAL_PORT: '{{.LOCAL_PORT | default "10443"}}'
    cmds:
      - chmod +x scripts/tunnel.sh
      - |
        export REMOTE_HOST='{{.REMOTE_HOST}}' REMOTE_PORT='{{.REMOTE_PORT}}' LOCAL_PORT='{{.LOCAL_PORT}}'
        if [ -f /.dockerenv ]; then
          bash scripts/tunnel.sh start
        else
          CONTAINER=$(docker ps -q --filter "volume={{.PWD}}" 2>/dev/null | head -1)
          if [ -z "$CONTAINER" ]; then
            CONTAINER=$(docker ps -q --filter "name=esxi-lab-provider" 2>/dev/null | head -1)
          fi
          if [ -z "$CONTAINER" ]; then
            echo "No devcontainer found. Run from inside the devcontainer or set CONTAINER id." >&2
            exit 1
          fi
          docker exec -e REMOTE_HOST -e REMOTE_PORT -e LOCAL_PORT "$CONTAINER" \
            bash -lc '/workspaces/esxi-lab-provider/scripts/tunnel.sh start'
        fi

  tunnel:stop:
    desc: Stop the ESXi TCP tunnel
    vars:
      LOCAL_PORT: '{{.LOCAL_PORT | default "10443"}}'
    cmds:
      - |
        export LOCAL_PORT='{{.LOCAL_PORT}}'
        if [ -f /.dockerenv ]; then
          bash scripts/tunnel.sh stop
        else
          CONTAINER=$(docker ps -q --filter "volume={{.PWD}}" 2>/dev/null | head -1)
          [ -n "$CONTAINER" ] || CONTAINER=$(docker ps -q --filter "name=esxi-lab-provider" 2>/dev/null | head -1)
          docker exec -e LOCAL_PORT "$CONTAINER" bash -lc '/workspaces/esxi-lab-provider/scripts/tunnel.sh stop'
        fi

  tunnel:status:
    desc: Show ESXi tunnel and WireGuard status
    vars:
      LOCAL_PORT: '{{.LOCAL_PORT | default "10443"}}'
    cmds:
      - |
        export LOCAL_PORT='{{.LOCAL_PORT}}'
        if [ -f /.dockerenv ]; then
          bash scripts/tunnel.sh status
        else
          CONTAINER=$(docker ps -q --filter "volume={{.PWD}}" 2>/dev/null | head -1)
          [ -n "$CONTAINER" ] || CONTAINER=$(docker ps -q --filter "name=esxi-lab-provider" 2>/dev/null | head -1)
          docker exec -e LOCAL_PORT "$CONTAINER" bash -lc '/workspaces/esxi-lab-provider/scripts/tunnel.sh status'
        fi

  test:
    desc: Run all unit tests
    dir: api
    cmds:
      - go test ./... -count=1

  test:verbose:
    desc: Run all unit tests with verbose output
    dir: api
    cmds:
      - go test ./... -v -count=1

  test:coverage:
    desc: Run tests with coverage report and enforce thresholds
    dir: api
    cmds:
      - go test ./... -coverprofile=coverage.out -count=1
      - go tool cover -func=coverage.out
      - |
        echo ""
        echo "=== Coverage Gate ==="
        FAIL=0
        for pkg in internal/config internal/logger internal/orchestrator; do
          pct=$(go tool cover -func=coverage.out \
            | awk -v p="github.com/EpicMandM/esxi-lab-provider/api/${pkg}" '$1 ~ p && /total:/ {gsub(/%/,"",$NF); print $NF}')
          if [ -z "$pct" ]; then
            pct=$(go test -cover ./${pkg}/ 2>&1 \
              | awk -F'[[:space:]]+|%' '/coverage:/{for(i=1;i<=NF;i++) if($i+0==$i && $i>0){print $i; exit}}')
          fi
          if awk "BEGIN{exit(!($pct+0 < 100.0))}"; then
            echo "FAIL: ${pkg} coverage is ${pct}% (required: 100%)"
            FAIL=1
          else
            echo "PASS: ${pkg} coverage is ${pct}%"
          fi
        done
        if [ "$FAIL" = "1" ]; then
          echo ""
          echo "Coverage gate FAILED. Fix failing packages before committing."
          exit 1
        fi
        echo ""
        echo "Coverage gate PASSED."
      - rm -f coverage.out

  gcloud:auth:
    desc: GCP auth — interactive locally, service account via env in CI
    cmds:
      - ./scripts/gcloud-auth.sh

  config:generate:
    desc: Generate .env and user_config.toml (used by infra:apply)
    deps: [gcloud:auth]
    dir: infra/terraform/app-config
    cmds:
      - task: infra:lab
      - tofu init -input=false
      - tofu apply -auto-approve

  secrets:push:
    desc: Upload secrets.env to Secret Manager (used by infra:apply)
    deps: [gcloud:auth]
    cmds:
      - ./scripts/push-lab-env-secret.sh

  infra:init:
    desc: Create local override files (apply uses remote config by default)
    deps: [gcloud:auth]
    cmds:
      - |
        set -euo pipefail
        ROOT="$PWD"
        # shellcheck source=scripts/lib/lab-config.sh
        source "$ROOT/scripts/lib/lab-config.sh"
        override="$(lab_override_file)"
        example="$ROOT/infra/terraform/lab/lab.auto.tfvars.example"
        if [[ ! -f "$override" ]]; then
          if lab_has_remote_state; then
            lab_write_tfvars_from_remote "$override"
            echo "Created infra/terraform/lab/lab.auto.tfvars from GCS remote state — edit to override"
          else
            cp "$example" "$override"
            echo "Created infra/terraform/lab/lab.auto.tfvars from example — edit for first-time setup"
          fi
        else
          echo "infra/terraform/lab/lab.auto.tfvars already exists — leaving unchanged"
        fi
        if [[ ! -f secrets.env ]]; then
          if "$ROOT/scripts/pull-lab-env-secret.sh"; then
            :
          else
            cp secrets.env.example secrets.env
            echo "Created secrets.env from example — fill credentials for first-time setup"
          fi
        else
          echo "secrets.env already exists — leaving unchanged"
        fi

  infra:gcloud:
    desc: GCP service account + Secret Manager secret
    deps: [gcloud:auth]
    dir: infra/terraform/gcloud
    cmds:
      - tofu init -input=false
      - tofu apply -auto-approve

  infra:lab:
    desc: Store lab site settings in remote Terraform state
    deps: [gcloud:auth]
    dir: infra/terraform/lab
    cmds:
      - ../../../scripts/sync-lab-config.sh
      - tofu init -input=false
      - |
        set -euo pipefail
        if [[ -f lab.auto.tfvars ]]; then
          tofu apply -auto-approve -var-file=lab.auto.tfvars
        elif [[ -f lab.remote.auto.tfvars ]]; then
          tofu apply -auto-approve -var-file=lab.remote.auto.tfvars
        else
          tofu apply -auto-approve
        fi

  infra:esxi:
    desc: ESXi lab users and VM permissions
    deps: [gcloud:auth]
    dir: infra/terraform/esxi-users
    cmds:
      - task: infra:lab
      - |
        set -euo pipefail
        esxi_url="$(tofu -chdir=../lab output -raw esxi_url 2>/dev/null || true)"
        case "$esxi_url" in
        https://127.0.0.1:*|http://127.0.0.1:*)
          task tunnel
          ;;
        esac
      - tofu init -input=false
      - |
        set -euo pipefail
        plan_file="$(mktemp)"
        trap 'rm -f "$plan_file"' EXIT
        set +e
        tofu plan -input=false -no-color -detailed-exitcode >"$plan_file" 2>&1
        plan_code=$?
        set -e
        if [ "$plan_code" -eq 0 ]; then
          cat "$plan_file"
          echo "ESXi users: no changes"
          exit 0
        fi
        if [ "$plan_code" -ne 2 ]; then
          cat "$plan_file"
          exit "$plan_code"
        fi
        cat "$plan_file"
        if grep -qE 'will be destroyed|null_resource\.esxi_role.*must be replaced' "$plan_file"; then
          tofu apply -auto-approve
          exit 0
        fi
        if grep -q 'null_resource.*will be created' "$plan_file"; then
          chmod +x ../../../scripts/adopt-esxi-users-state.sh
          ../../../scripts/adopt-esxi-users-state.sh
          exit 0
        fi
        tofu apply -auto-approve

  infra:wireguard:
    desc: WireGuard peers on OPNsense (bootstrap only; skipped when not in state)
    deps: [gcloud:auth]
    dir: infra/terraform/opnsense-wireguard
    cmds:
      - task: infra:lab
      - tofu init -input=false
      - |
        set -euo pipefail
        if tofu state list 2>/dev/null | grep -q '^opnsense_wireguard_'; then
          tofu apply -auto-approve
          exit 0
        fi
        plan_file="$(mktemp)"
        trap 'rm -f "$plan_file"' EXIT
        set +e
        tofu plan -input=false -no-color -detailed-exitcode >"$plan_file" 2>&1
        plan_code=$?
        set -e
        if [ "$plan_code" -eq 0 ]; then
          cat "$plan_file"
          echo "WireGuard: no changes"
          exit 0
        fi
        if [ "$plan_code" -ne 2 ]; then
          cat "$plan_file"
          exit "$plan_code"
        fi
        cat "$plan_file"
        echo "WireGuard not in Terraform state — using existing OPNsense config (remote lab state)."
        echo "To bootstrap peers: cd infra/terraform/opnsense-wireguard && tofu apply"

  infra:apply:
    desc: Full lab provisioning (remote config by default; use infra:init to override)
    deps: [gcloud:auth]
    cmds:
      - task: infra:gcloud
      - task: secrets:push
      - task: infra:esxi
      - task: infra:wireguard
      - task: config:generate
