name: Devcontainer

on:
  # 06:00 UTC on the 1st and 15th (~every two weeks)
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  should-build:
    name: Check whether to build
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Decide
        id: decide
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch)
              echo "build=true" >> "$GITHUB_OUTPUT"
              ;;
            schedule)
              if git log --since='14 days ago' --oneline -- \
                '.devcontainer' '.github/workflows/devcontainer.yml' | grep -q .; then
                echo "build=true" >> "$GITHUB_OUTPUT"
                echo "Devcontainer paths changed in the last 14 days; building."
              else
                echo "build=false" >> "$GITHUB_OUTPUT"
                echo "No devcontainer changes in the last 14 days; skipping build."
              fi
              ;;
          esac

  build:
    name: Build and push to GHCR
    needs: should-build
    if: needs.should-build.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set image name
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/devcontainer"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "CACHE=${IMAGE}:buildcache" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push devcontainer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.CACHE }}
            type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=registry,ref=${{ env.CACHE }},mode=max

      - name: Verify image tools
        run: |
          docker run --rm "${{ env.IMAGE }}:${{ github.sha }}" sh -c \
            'go version && task --version && tofu version && gcloud --version && gh --version && govc version && hadolint --version'
