name: Auto-approve Renovate PRs

# Trigger after the CI workflow completes so approval only happens when
# all tests and checks have passed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Default for all jobs; auto-approve needs write access to PRs and merge settings.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve:
    name: Approve and enable automerge for Renovate PRs
    runs-on: ubuntu-latest
    # Only run when:
    #   1. CI passed (conclusion == 'success')
    #   2. Triggered by a pull_request event (not a push to main)
    #   3. The branch is a Renovate branch (head_branch may be owner:branch or refs/heads/...)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      contains(github.event.workflow_run.head_branch, 'renovate/')

    steps:
      - name: Find open PR for this workflow run
        id: find-pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const raw = context.payload.workflow_run.head_branch || '';
            let headBranch = raw.includes(':')
              ? raw.slice(raw.indexOf(':') + 1)
              : raw;
            if (headBranch.startsWith('refs/heads/')) {
              headBranch = headBranch.slice('refs/heads/'.length);
            }

            const headSha = context.payload.workflow_run.head_sha;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${headBranch}`,
            });

            const pr = prs.find(p => p.head.sha === headSha || p.head.ref === headBranch);

            if (!pr) {
              core.warning(`No open PR found for branch "${headBranch}" (raw: "${raw}", sha: ${headSha})`);
              core.setOutput('pr-found', 'false');
              return;
            }

            core.info(`Found PR #${pr.number}: ${pr.title}`);
            core.setOutput('pr-number', String(pr.number));
            core.setOutput('pr-node-id', pr.node_id);
            core.setOutput('pr-found',   'true');

      # Approve the PR.
      # NOTE: GITHUB_TOKEN auto-approval counts as an approving review only when
      # branch-protection "Require approvals" is NOT set to require a human reviewer.
      # If GitHub blocks bot approvals, enable Settings → Actions → "Allow GitHub
      # Actions to create and approve pull requests", or set secrets.AUTO_APPROVE_PAT
      # (e.g. a PAT from a user allowed to satisfy branch protection / CODEOWNERS).
      - name: Approve PR
        if: steps.find-pr.outputs.pr-found == 'true'
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          pull-request-number: ${{ steps.find-pr.outputs.pr-number }}
          github-token: ${{ secrets.AUTO_APPROVE_PAT || secrets.GITHUB_TOKEN }}

      # Enable GitHub's built-in automerge using the repository default merge method.
      # Requires "Allow auto-merge" to be enabled in the repository settings
      # (Settings → General → Pull Requests → Allow auto-merge).
      - name: Enable automerge
        if: steps.find-pr.outputs.pr-found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.AUTO_APPROVE_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const prNodeId = '${{ steps.find-pr.outputs.pr-node-id }}';

            // Omit mergeMethod so GitHub uses the repository default (avoids failure
            // when squash merge is disabled but merge commits are allowed).
            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId
                }) {
                  pullRequest {
                    autoMergeRequest { enabledAt }
                  }
                }
              }
            `, { pullRequestId: prNodeId });

            core.info(`Automerge enabled for PR #${{ steps.find-pr.outputs.pr-number }}`);
