name: Renovate

on:
  # Run every day at 03:00 UTC
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Renovate log level'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: .github/renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Tell Renovate which repository to operate on when using a PAT.
          # Without this, Renovate cannot discover repos from a fine-grained token.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Use the GitHub Actions bot identity to avoid unsigned-commit warnings.
          RENOVATE_GIT_AUTHOR: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          # Set log level: use workflow_dispatch input when triggered manually,
          # otherwise default to info.
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
